{% extends "base.html" %}
{% block content %}

<div class="job-container">

    <h1 class="title">Join Zeyra Team</h1>
    <p class="subtitle">Fill in your details and start your career journey with us</p>

    <form method="POST" enctype="multipart/form-data" class="job-form">

        <!-- Personal Information -->
        <div class="section">
            <h2>Personal Information</h2>

            <div class="grid-4">
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="text" name="middle_name" placeholder="Middle Name">
                <input type="text" name="last_name" placeholder="Last Name" required>
                <input type="date" name="date_of_birth">
            </div>

            <div class="grid-3">
                <input type="text" name="nationality" placeholder="Nationality">
                <input type="text" name="national_id" placeholder="National ID Number" required>
                <input type="text" name="phone" placeholder="Phone Number" required>
            </div>

            <input type="text" name="address" placeholder="Full Address">

            <div class="grid-2">
                <select name="gender">
                    <option value="">Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>

                <select name="marital_status">
                    <option value="">Marital Status</option>
                    <option value="Single">Single</option>
                    <option value="Married">Married</option>
                </select>
            </div>
        </div>

        <!-- Education -->
        <div class="section">
            <h2>Education</h2>

            <div class="grid-3">
                <input type="text" name="degree" placeholder="Degree">
                <input type="text" name="major" placeholder="Major">
                <input type="text" name="graduation_year" placeholder="Graduation Year">
            </div>
        </div>

        <!-- Skills -->
        <div class="section">
            <h2>Skills & Courses</h2>
            <textarea name="skills" placeholder="Write your skills..."></textarea>
        </div>

        <!-- Experience -->
        <div class="section">
            <h2>Work Experience</h2>

            <div class="grid-3">
                <input type="text" name="experience_years" placeholder="Years of Experience">

                <select name="employment_status">
                    <option value="">Employment Status</option>
                    <option value="Employed">Employed</option>
                    <option value="Unemployed">Unemployed</option>
                </select>

                <input type="text" name="current_salary" placeholder="Current Salary">
            </div>

            <input type="text" name="expected_salary" placeholder="Expected Salary">
        </div>

        <!-- Languages -->
        <div class="section">
            <h2>Languages</h2>

            <div class="grid-2">
                <input type="text" name="language" placeholder="Language (e.g. English)" required>

                <select name="language_level" required>
                    <option value="">Level</option>
                    <option value="Basic">Basic</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                    <option value="Fluent">Fluent</option>
                </select>
            </div>
        </div>

        <!-- Contact -->
        <div class="section">
            <h2>Contact Details</h2>

            <div class="grid-2">
                <input type="text" name="phone_alt" placeholder="Alternative Phone">
                <input type="email" name="email" placeholder="Email Address" required>
            </div>
        </div>

        <!-- Documents -->
        <div class="section">
            <h2>Required Documents</h2>

            <div class="grid-3 file-inputs">

                <div class="file-card">
                    <label>CV / Resume</label>
                    <input type="file" name="cv" required>
                </div>

                <div class="file-card">
                    <label>ID Front</label>
                    <input type="file" name="id_front" required>
                </div>

                <div class="file-card">
                    <label>ID Back</label>
                    <input type="file" name="id_back" required>
                </div>

            </div>
        </div>

        <button type="submit" class="apply-btn">
            🚀 Submit Application
        </button>

    </form>

</div>

{% endblock %}
