{% extends "base.html" %}

{% block content %}

<div class="admin-container">

    <h1>Admin Dashboard</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Phone</th>
                <th>Email</th>
                <th>CV</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.first_name }} {{ user.last_name }}</td>
                <td>{{ user.phone }}</td>
                <td>{{ user.email }}</td>

                <td>
                    <a href="{{ url_for('static', filename='uploads/' + user.cv) }}" target="_blank">
                        View CV
                    </a>
                </td>

                <td>
                    <a href="/delete/{{ user.id }}" class="delete-btn">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
