{% extends "base.html" %}
{% block content %}

<style>
body {
    background: linear-gradient(135deg,#0b1c39,#1a3a6b);
}

.login-box {
    width:350px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

.login-box h2 {
    margin-bottom:20px;
    color:#0b1c39;
}

input {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:100%;
    padding:12px;
    background:#0b1c39;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover {
    background:#1a3a6b;
}
</style>

<div class="login-box">
    <h2>Admin Login</h2>

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    {% if error %}
        <p style="color:red;">{{ error }}</p>
    {% endif %}
</div>

{% endblock %}
